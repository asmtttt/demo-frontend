<nav class="top-nav">
  <div class="nav-brand">
    <img src="assets/images/amfy-logo-4.png" alt="Logo" class="brand-logo" />
    <span class="brand-name">Disaster</span>
  </div>

  <div class="nav-links" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">
      <span class="material-icons">dashboard</span>
      <span>Dashboard</span>
    </a>
    <a routerLink="/buildings" routerLinkActive="active" (click)="menuOpen=false">
      <span class="material-icons">apartment</span>
      <span>Binalar</span>
    </a>
    <a routerLink="/map" routerLinkActive="active" (click)="menuOpen=false">
      <span class="material-icons">map</span>
      <span>Harita</span>
    </a>
    <a routerLink="/chat" routerLinkActive="active" (click)="menuOpen=false">
      <span class="material-icons">chat</span>
      <span>Mesajlar</span>
    </a>
    <a routerLink="/admin" routerLinkActive="active" *ngIf="authService.isAdmin" (click)="menuOpen=false">
      <span class="material-icons">admin_panel_settings</span>
      <span>Admin</span>
    </a>
  </div>

  <div class="nav-user">
    <span class="user-name">{{ authService.currentProfile?.full_name }}</span>
    <a routerLink="/profile" title="Profil" (click)="menuOpen=false">
      <span class="material-icons">account_circle</span>
    </a>
    <button (click)="logout()" title="Çıkış" class="logout-btn">
      <span class="material-icons">logout</span>
    </button>
    <button class="hamburger" (click)="toggleMenu()" [class.active]="menuOpen" aria-label="Menü">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="nav-overlay" *ngIf="menuOpen" (click)="menuOpen=false"></div>
