<div class="auth-layout">
  <div class="auth-panel-left">
    <div class="left-bg-img"></div>
    <div class="left-content">
      <img src="assets/images/amfy-logo-4.png" alt="Disaster Logo" class="brand-logo" />
      <h1 class="brand-title">Disaster</h1>
      <p class="brand-subtitle">Deprem Analiz ve Yönetim Sistemi</p>
    </div>
  </div>

  <div class="auth-panel-right">
    <div class="auth-form-wrap">
      <div class="form-header">
        <h2>Şifre Sıfırla</h2>
        <p>E-posta adresinize sıfırlama bağlantısı göndereceğiz.</p>
      </div>

      <div class="alert-success" *ngIf="sent">
        <span class="material-icons">mark_email_read</span>
        Sıfırlama bağlantısı e-posta adresinize gönderildi.
      </div>

      <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()" *ngIf="!sent">
        <div class="field-group">
          <label>E-posta Adresi</label>
          <input type="email" formControlName="email" placeholder="ornek@email.com" autocomplete="email" />
          <span class="field-error"
            *ngIf="showError && resetPasswordForm.controls['email'].invalid">
            Geçerli bir e-posta adresi giriniz.
          </span>
        </div>

        <button type="submit" class="btn-submit" [disabled]="loading">
          <span *ngIf="!loading">Sıfırlama Bağlantısı Gönder</span>
          <span *ngIf="loading" class="loading-dots">Gönderiliyor</span>
        </button>
      </form>

      <div class="auth-link">
        <a routerLink="/auth/login">← Giriş sayfasına dön</a>
      </div>
    </div>
  </div>
</div>
