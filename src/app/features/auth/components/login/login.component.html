<!-- Login Yapısı -->
<form class="border" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <div class="row justify-content-center">
    <img src="/assets/images/amfy-logo-5.png" alt="">
  </div>
  <div class="form-group row mt-3">
    <div class="text-center">
        <h3 class="mt-1">{{'LOGIN' | translate}}</h3>
        <hr style="width:50%; margin: auto;">
    </div>
  </div>
  <div class="form-group row mt-1">
    <label style="margin-top: 5%;"><small>{{'EMAIL' | translate}}</small></label>
    <input class="form-control border-top-0 border-end-0 border-2 border-start-0 border-dark rounded-0" 
    type="text" style="border: 1px solid bottom!important;"
    placeholder="{{ 'PLEASE_ENTER_EMAIL' | translate }}" id="username" name="username" class="form-control" formControlName="email">
    <small class="required-color" *ngIf="showError && (loginForm.controls.email.invalid || loginForm.controls.email.errors?.required)">{{ 'REQUIRED_INPUT' | translate }}</small>
  </div>
  <div class="form-group row mt-2">
    <label><small>{{'PASSWORD' | translate}}</small></label>
    <input class="form-control mt-2 border-top-0 border-end-0 border-2 border-start-0 border-dark rounded-0" formControlName="password"
    type="password" placeholder="{{ 'PLEASE_ENTER_PASSWORD' | translate }}"
    id="password" name="password" class="form-control">
    <small class="required-color" *ngIf="showError && loginForm.controls.password.errors?.required">{{ 'REQUIRED_INPUT' | translate }}</small>
    <small class="required-color" *ngIf="showError && loginForm.controls.password.invalid && !loginForm.controls.password.errors?.required">{{ 'PASSWORD_RULES' | translate }}*</small>
  </div>

  <div class="col-12 text-center mt-2 messageText">
    <small class="text-danger" *ngIf="responseMessage.messageType == MessageType.Information" style="visibility: hidden;"></small>
    <small class="text-danger" *ngIf="responseMessage.messageType == MessageType.Error"  style="visibility: visible;"  >{{ responseMessage.message }}</small>
    <small class="text-success" *ngIf="responseMessage.messageType == MessageType.Success" style="visibility: visible;" >{{ responseMessage.message }}</small>
  </div>
  
  <div class="form-group row mt-2">
    <div class="form-check col align-items-center d-flex">
      <input class="form-check-input cursor" type="checkbox" value="" id="flexCheckDefault">
      <label class="form-check-label small text-dark mt-1 cursor" id="remember_me" for="flexCheckDefault" style="margin-left:5px;">
        {{ 'REMEMBER_ME' | translate }}
      </label> 
    </div>
    <div class="form-check col align-items-center text-end"><a [routerLink]="['/auth/resetPassword']">
        <span class="display-inline text-dark small" id="forgot_password">{{ 'FORGOT_PASSWORD' | translate }}</span></a></div>
  </div>
  <div class="form-group row mt-2">
    <div class="d-grid gap-2 mt-2">
      <button class="button btn btn-danger" type="submit">{{ 'LOGIN' | translate }}</button>
    </div>
    <div class="d-grid gap-2 mt-2">
      <button class="button btn btn-light" type="submit" [routerLink]="['/auth/register']">{{ 'NOT_A_REMEMBER_YET' | translate }}</button>
    </div>
  </div>

  <app-language></app-language>
</form>


<!-- Error Message Modal -->
<div class="modal fade" [class.show]="showModal" [style.display]="showModal ? 'block' : 'none'" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="errorModalLabel">{{ 'ERROR' | translate }}</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="toggleModal()"></button>
      </div>
      <div class="modal-body">
        {{ responseMessage.message }}
      </div>
      <div class="modal-footer">
        <button class="button btn btn-danger" type="button" (click)="toggleModal()">{{ 'CLOSE' | translate }}</button>
      </div>
    </div>
  </div>
</div>
