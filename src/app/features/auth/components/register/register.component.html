<div class="auth-layout">
  <div class="auth-panel-left">
    <div class="left-content">
      <img src="assets/images/amfy-logo-4.png" alt="Disaster Logo" class="brand-logo" />
      <h1 class="brand-title">Disaster</h1>
      <p class="brand-subtitle">Deprem Analiz ve Yönetim Sistemi</p>
      <img src="assets/images/build-2.png" alt="Buildings" class="deco-img" />
    </div>
    <div class="left-bg-img" style="background-image: url('assets/images/login-background-photo.jpeg')"></div>
  </div>

  <div class="auth-panel-right">
    <div class="auth-form-wrap">
      <div class="form-header">
        <h2>Hesap Oluştur</h2>
        <p>Sisteme kaydolmak için formu doldurun</p>
      </div>

      <div class="alert-success" *ngIf="successMessage">
        <span>&#10003;</span> {{ successMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
        <div class="field-group">
          <label>Ad Soyad</label>
          <input type="text" formControlName="fullName" placeholder="Ahmet Yılmaz" autocomplete="name" />
          <span class="field-error" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.invalid">
            Ad soyad zorunludur.
          </span>
        </div>

        <div class="field-group">
          <label>E-posta</label>
          <input type="email" formControlName="email" placeholder="ornek@mail.com" autocomplete="email" />
          <span class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
            Geçerli bir e-posta girin.
          </span>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>Telefon <span class="optional">(isteğe bağlı)</span></label>
            <input type="tel" formControlName="phone" placeholder="+90 555 000 0000" />
          </div>
          <div class="field-group">
            <label>Şifre</label>
            <input type="password" formControlName="password" placeholder="En az 6 karakter" autocomplete="new-password" />
            <span class="field-error" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
              Şifre en az 6 karakter olmalı.
            </span>
          </div>
        </div>

        <div class="alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" [disabled]="loading" class="btn-submit">
          <span *ngIf="!loading">Kayıt Ol</span>
          <span *ngIf="loading" class="loading-dots">Kayıt yapılıyor</span>
        </button>
      </form>

      <div class="auth-link">
        Hesabın var mı? <a routerLink="/auth/login">Giriş Yap</a>
      </div>
    </div>
  </div>
</div>
